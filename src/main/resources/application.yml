spring:
  application:
    name: smart-research

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:researchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  # AI Configuration
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: tinyllama

  # Elasticsearch Configuration - MOVED HERE under spring:
  elasticsearch:
    uris: https://localhost:9200
    username: elastic
    password: ajay5702
    connection-timeout: 10s
    socket-timeout: 60s
    ssl:
      verification-mode: certificate  # Use 'certificate' instead of 'none'

# Server configuration
server:
  port: 8080

# Custom app properties
app:
  ai:
    provider: ollama
    enabled: true